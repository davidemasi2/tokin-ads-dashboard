const state = {sort:"spend", dir:-1, slice:"all", tab:"ads", view:"grid"};
const $ = s=>document.querySelector(s);
const $$ = s=>document.querySelectorAll(s);

function uniq(key){return [...new Set(DATA.map(r=>r[key]).filter(x=>x))].sort()}
["acc|account","yr|year","fmt|format","st|status","obj|objective","comp|compliance"].forEach(p=>{
  const [id,k]=p.split("|"); const el=$("#"+id);
  uniq(k).forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;el.appendChild(o)});
});
[...new Set(DATA.flatMap(r=>r.offers||[]))].sort().forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;$("#off").appendChild(o)});

function filt(){
  const q=$("#q").value.toLowerCase();
  return DATA.filter(r=>{
    if($("#acc").value && r.account!==$("#acc").value)return 0;
    if($("#yr").value && r.year!==$("#yr").value)return 0;
    if($("#fmt").value && r.format!==$("#fmt").value)return 0;
    if($("#st").value && r.status!==$("#st").value)return 0;
    if($("#obj").value && r.objective!==$("#obj").value)return 0;
    if($("#comp").value && r.compliance!==$("#comp").value)return 0;
    if($("#off").value && !(r.offers||[]).includes($("#off").value))return 0;
    const s=state.slice;
    if(s==="winners" && !(r.roas>=2 && r.spend>=100))return 0;
    if(s==="losers" && !(r.roas<1 && r.spend>=100))return 0;
    if(s==="spent" && !(r.spend>=1))return 0;
    if(s==="zero" && r.spend>=1)return 0;
    if(q){
      const hay=(r.ad_name+" "+r.body+" "+r.title+" "+r.campaign+" "+r.adset+" "+r.audience+" "+r.cta).toLowerCase();
      if(!hay.includes(q))return 0;
    }
    return 1;
  }).sort((a,b)=>{
    const va=a[state.sort], vb=b[state.sort];
    const cmp = (va===vb)?0:(va<vb?-1:1);
    return state.dir===-1 ? -cmp : cmp;
  });
}
function badge(r){
  if(r.spend<1) return '<span class="badge b-off">no spend</span>';
  if(r.roas>=2) return '<span class="badge b-win">ROAS '+r.roas+'x</span>';
  if(r.roas>=1) return '<span class="badge b-mid">ROAS '+r.roas+'x</span>';
  if(r.purchases>0) return '<span class="badge b-loss">ROAS '+r.roas+'x</span>';
  return '<span class="badge b-loss">no purchase</span>';
}
function compBadge(c){
  const map={CLEAN:"b-clean",WITH_ISSUES:"b-issues",DISAPPROVED:"b-disapproved",ACCOUNT_SUSPENDED:"b-acctsusp"};
  const lbl={CLEAN:"Clean",WITH_ISSUES:"Issues",DISAPPROVED:"Disapproved",ACCOUNT_SUSPENDED:"Acct Suspended"};
  return `<span class="badge ${map[c]||'b-off'}">${lbl[c]||c}</span>`;
}
function fmt$(n){return n>=1000?"$"+(n/1000).toFixed(1)+"k":"$"+n.toFixed(2)}
function fmtN(n){return n>=1000?(n/1000).toFixed(1)+"k":n.toString()}

function render(){
  if(state.tab==="ads") renderAds();
  else if(state.tab==="groups") renderGroups();
  else if(state.tab==="analysis") renderAnalysis();
  else renderAudiences();
}
function renderAds(){
  const rs=filt();
  $("#count").textContent=rs.length+" ads";
  const fs=rs.reduce((a,r)=>a+r.spend,0);
  const fv=rs.reduce((a,r)=>a+r.purchase_value,0);
  $("#fspend").textContent=fmt$(fs);
  $("#froas").textContent=(fs?fv/fs:0).toFixed(2)+"x";
  if(state.view==="table"){ renderTable(rs); return; }
  $("#grid").innerHTML=rs.map(r=>`
    <div class="card" onclick="openDetail('${r.ad_id}')">
      ${r.thumb?`<img class="hero" src="${r.thumb}" loading="lazy">`:'<div style="aspect-ratio:1/1;background:#0b0d13;display:grid;place-items:center;color:#8b93a7;font-size:11px">no creative</div>'}
      <div class="meta">
        <div class="name" title="${(r.ad_name||'').replace(/"/g,'&quot;')}">${r.ad_name||'(unnamed)'}</div>
        <div style="margin:4px 0;display:flex;flex-wrap:wrap;gap:3px">${badge(r)} ${compBadge(r.compliance)} <span class="accountpill">${r.account.replace('Tokin Chews ','TC')}</span></div>
        ${r.offers && r.offers.length?`<div class="offers">${r.offers.map(o=>'<span class="badge b-offer">'+o+'</span>').join('')}</div>`:''}
        <div class="row"><span>Audience</span><b style="font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.audience}">${r.audience}</b></div>
        <div class="row"><span>Spend</span><b>${fmt$(r.spend)}</b></div>
        <div class="row"><span>Purch</span><b>${r.purchases}</b></div>
        <div class="row"><span>CTR</span><b>${r.ctr}%</b></div>
        <div class="row"><span>CPP</span><b>${r.cpp?fmt$(r.cpp):'—'}</b></div>
        <div class="row"><span>Format</span><b>${r.format}</b></div>

function funnelHTML(r){
  const steps=[
    ["Impressions", r.impressions, null],
    ["Link clicks", r.link_clicks, r.impressions],
    ["Landing view", r.lpv, r.link_clicks],
    ["Add to cart", r.atc, r.lpv||r.link_clicks],
    ["Checkout", r.ic, r.atc],
    ["Purchase", r.purchases, r.ic||r.atc],
  ];
  const top=Math.max(...steps.map(s=>s[1]))||1;
  return `<div class="funnel">`+steps.map(([lbl,v,prev])=>{
    const pct=(v/top*100).toFixed(1);
    const cvr=prev?((v/prev)*100).toFixed(1)+"%":"";
    return `<div class="step"><div class="lbl">${lbl}</div><div class="bar"><span style="width:${pct}%"></span></div><div class="val">${v.toLocaleString()}<span class="rate">${cvr}</span></div></div>`;
  }).join("")+`</div>`;
}

function fmtMoney(n){return "$"+(n||0).toLocaleString(undefined,{maximumFractionDigits:0})}
function fmtPct(n){return (n||0).toFixed(2)+"%"}

function renderAnalysis(){
  const A=ANALYSIS;
  $("#count").textContent="analysis";
  const t=A.totals, f=A.funnel;
  const net=t.revenue-t.spend;
  const aov=t.purchases?t.revenue/t.purchases:0;
  const steps=[
    ["Impressions", f.imps, null, null],
    ["Link clicks", f.clicks, f.click_rate+"% CTR", f.imps],
    ["Landing view", f.lpv, f.lpv_rate.toFixed(0)+"% of clicks", f.clicks],
    ["Add to cart", f.atc, f.atc_rate.toFixed(0)+"% of LPV", f.lpv],
    ["Initiate checkout", f.ic, f.ic_rate.toFixed(0)+"% of ATC", f.atc],
    ["Purchase", f.purchases, f.purch_rate.toFixed(0)+"% of IC", f.ic],
  ];
  const max=Math.max(...steps.map(s=>s[1]))||1;

  const funnelHtml=steps.map(s=>{
    const [lbl,v,rate]=s;
    const pct=(v/max*100).toFixed(1);
    return `<div class="funnel-step"><div class="lbl">${lbl}</div><div class="bar"><span style="width:${pct}%"></span></div><div class="val">${(v||0).toLocaleString()}${rate?`<span class="rate">${rate}</span>`:""}</div></div>`;
  }).join("");

  // Funnel diagnoses
  const diag=[];
  if(f.click_rate<1.2) diag.push({t:"warn",h:`CTR is low (${f.click_rate.toFixed(2)}%)`, b:"Industry benchmark for supplement/CPG DTC is 1.2–1.8%. Creative hook or audience targeting is the bottleneck."});
  else diag.push({t:"good",h:`CTR is healthy (${f.click_rate.toFixed(2)}%)`, b:"Creative + audience combo is working at the top of funnel."});
  if(f.lpv_rate<70) diag.push({t:"crit",h:`Landing page drop is brutal — only ${f.lpv_rate.toFixed(0)}% of clickers load the page`, b:"Page speed, mobile render, or ad-to-page mismatch. Likely the single biggest fixable leak."});
  if(f.atc_rate>0 && f.atc_rate<20) diag.push({t:"warn",h:`ATC rate ${f.atc_rate.toFixed(1)}% of LPV is weak`, b:"Landing page doesn't convert browsers to shoppers. Test above-fold offer, social proof, or price framing."});
  if(f.ic_rate>0 && f.ic_rate<40) diag.push({t:"warn",h:`Checkout drop-off — only ${f.ic_rate.toFixed(0)}% of ATC initiate checkout`, b:"Shipping cost, free-ship threshold, or account-create requirement worth testing."});
  if(f.purch_rate>0 && f.purch_rate<60) diag.push({t:"warn",h:`Final purchase step: ${f.purch_rate.toFixed(0)}% of IC complete`, b:"Payment options, express checkout, or shipping-estimate at checkout are common fixes."});

  const diagHtml=diag.map(d=>`<div class="diag ${d.t}"><b style="color:#e7e9ee">${d.h}.</b> ${d.b}</div>`).join("");

  // Top-line KPIs
  const kpis=[
    ["Total Spend", fmtMoney(t.spend), ""],
    ["Total Revenue", fmtMoney(t.revenue), ""],
    ["Net", fmtMoney(net), "rev − spend"],
    ["Blended ROAS", t.roas.toFixed(2)+"x", ""],
    ["Purchases", t.purchases.toLocaleString(), ""],
    ["Avg CPP", fmtMoney(t.cpp), ""],
    ["AOV", fmtMoney(aov), ""],
    ["Ads shipped", t.n_ads, ""],
  ];

function downloadCSV(){
  const rs=filt(); if(!rs.length)return;
  const keys=Object.keys(rs[0]).filter(k=>typeof rs[0][k]!=="object"||Array.isArray(rs[0][k]));
  const csv=[keys.join(","),...rs.map(r=>keys.map(k=>JSON.stringify(Array.isArray(r[k])?r[k].join("|"):(r[k]??""))).join(","))].join("\n");
  const b=new Blob([csv],{type:"text/csv"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(b); a.download="tokin_ads_filtered.csv"; a.click();
}
