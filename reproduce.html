<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Reproduce Cohort · Tokin Chews</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box}
body{background:#0a0a0f;color:#e5e5ea;font:14px/1.55 -apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;margin:0;padding:0}
a{color:#60a5fa;text-decoration:none}a:hover{text-decoration:underline}
.topnav{display:flex;gap:4px;padding:10px 24px;background:#080812;border-bottom:1px solid #1f1f2e;overflow-x:auto;white-space:nowrap;position:sticky;top:0;z-index:20}
.topnav a{color:#9ca3af;font-size:13px;padding:6px 12px;border-radius:6px;text-decoration:none;font-weight:500}
.topnav a:hover{background:#1a1a24;color:#e5e5ea}
.topnav a.active{background:#3b82f6;color:#fff}
.topnav .divider{width:1px;background:#1f1f2e;margin:0 4px}
.topnav .ext::after{content:' \2197';font-size:11px;opacity:.6}
.topnav .actions{margin-left:auto;display:flex;gap:6px}
.topnav button{background:#151524;color:#e5e5ea;border:1px solid #272740;padding:6px 12px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:inherit}
.topnav button:hover{background:#1f1f2e}
.topnav button.primary{background:#16a34a;border-color:#15803d;color:#fff;font-weight:600}
.topnav button.primary:hover{background:#15803d}
.topnav button.danger{background:#2a1515;border-color:#5c1a1a;color:#fca5a5}
.hdr{padding:20px 24px 16px;background:#0f0f14;border-bottom:1px solid #1f1f2e}
.hdr h1{margin:0 0 6px 0;font-size:22px}
.hdr .sub{color:#8e8ea0;font-size:13px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:14px 24px}
.kpi{background:#151524;border:1px solid #272740;border-radius:10px;padding:12px 14px}
.kpi .k{color:#8e8ea0;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.kpi .v{font-size:22px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.kpi .s{font-size:11px;color:#60a5fa;margin-top:2px}
.cards{padding:0 24px 40px;display:grid;grid-template-columns:1fr;gap:16px}
.card{background:#0f0f14;border:1px solid #1f1f2e;border-radius:12px;overflow:hidden;display:grid;grid-template-columns:260px 1fr;gap:0}
.card .media{background:#0a0a0f;display:flex;align-items:center;justify-content:center;min-height:260px;position:relative}
.card .media img,.card .media video{width:100%;height:100%;max-height:380px;object-fit:contain}
.card .media .vid-badge{position:absolute;top:10px;left:10px;background:#b91c1c;color:#fee2e2;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600}
.card .body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.card h2{margin:0;font-size:17px;letter-spacing:-0.01em}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:#8e8ea0}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-shabbat{background:#6d28d9;color:#ede9fe}.pill-chews{background:#ea580c;color:#fff7ed}
.pill-jays{background:#ca8a04;color:#fefce8}.pill-gelt{background:#92400e;color:#fef3c7}
.pill-hamantaschen{background:#be185d;color:#fce7f3}.pill-k4p{background:#b91c1c;color:#fee2e2}
.pill-apparel{background:#1d4ed8;color:#dbeafe}.pill-paraphernalia{background:#374151;color:#e5e7eb}
.pill-hanukkah{background:#1e40af;color:#dbeafe}.pill-honey{background:#a16207;color:#fef3c7}
.pill-leadgen{background:#15803d;color:#dcfce7}.pill-420{background:#166534;color:#d1fae5}
.pill-other{background:#4b5563;color:#f3f4f6}
.dom-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;background:#1e293b;color:#93c5fd}
.flag-clean{color:#34d399}.flag-superlative{color:#fbbf24}.flag-thc{color:#f87171}
.flag-health{color:#f87171}.flag-fda{color:#f87171}.flag-guarantee{color:#fb923c}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:6px}
.metrics .m{background:#151524;border:1px solid #272740;border-radius:6px;padding:6px 8px;text-align:center}
.metrics .m .k{font-size:10px;color:#8e8ea0;text-transform:uppercase;letter-spacing:.05em}
.metrics .m .v{font-size:14px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.section h3{font-size:11px;color:#8e8ea0;text-transform:uppercase;letter-spacing:.06em;margin:0 0 4px;font-weight:600}
.section .v{background:#151524;border:1px solid #272740;border-radius:6px;padding:8px 10px;font-size:12.5px;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono',Menlo,monospace;line-height:1.55}
.section .v.plain{font-family:inherit}
.chip{display:inline-block;background:#1e293b;color:#93c5fd;padding:2px 7px;border-radius:4px;font-size:11px;margin:0 3px 3px 0}
.copy-btn{background:none;border:1px solid #272740;color:#8e8ea0;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:6px}
.copy-btn:hover{color:#e5e5ea;border-color:#60a5fa}
.empty{text-align:center;padding:80px 40px;color:#8e8ea0}
.empty h2{color:#e5e5ea;font-size:20px;margin-bottom:8px}
@media(max-width:900px){.card{grid-template-columns:1fr}.card .media{min-height:200px}}
@media print {
  .topnav, .topnav button { display:none !important }
  .card { page-break-inside: avoid; break-inside: avoid; margin-bottom:20px; border:1px solid #666 }
  body { background:#fff; color:#000 }
  .card .body { color:#000 }
  .card { background:#fff; border-color:#ddd }
  .section .v { background:#f8f8f8; color:#222 }
  .kpi { background:#f8f8f8; color:#222 }
  a { color:#0645ad }
}
</style>
</head>
<body>
<nav class="tj-nav" style="display:flex;gap:4px;padding:10px 24px;background:#080812;border-bottom:1px solid #1f1f2e;overflow-x:auto;white-space:nowrap;font:500 13px system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <a data-nav="/" href="/" style="color:#9ca3af;padding:6px 12px;border-radius:6px;text-decoration:none">📊 Paid Breakdown</a>
  <a data-nav="/organic_breakdown.html" href="/organic_breakdown.html" style="color:#9ca3af;padding:6px 12px;border-radius:6px;text-decoration:none">📱 Organic IG</a>
  <a data-nav="/creative_index.html" href="/creative_index.html" style="color:#9ca3af;padding:6px 12px;border-radius:6px;text-decoration:none">📇 Creative Index</a>

<script>
(function(){
  var p = window.location.pathname;
  if(p === '/index.html') p = '/';
  if(p === '/creative_breakdown.html') p = '/';
  document.querySelectorAll('nav.tj-nav a[data-nav]').forEach(function(a){
    if(a.getAttribute('data-nav') === p){
      a.style.background = '#3b82f6';
      a.style.color = '#fff';
    } else {
      a.addEventListener('mouseenter', function(){ a.style.background='#1a1a24'; a.style.color='#e5e5ea'; });
      a.addEventListener('mouseleave', function(){ a.style.background=''; a.style.color='#9ca3af'; });
    }

<div class="hdr">
<h1>🎬 Reproduce Cohort</h1>
<div class="sub">Selected creatives queued for reproduction · brief includes all copy, targeting, metrics, landing pages, and creative assets needed to recreate in Ads Manager</div>
</div>

<div class="kpis" id="kpis"></div>
<div class="cards" id="cards"></div>

<script>
const esc = s => (s===null||s===undefined?'':String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]));
const $ = id => document.getElementById(id);
const pillCls = c => ({'Shabbat':'pill-shabbat','Chews':'pill-chews','Jays/Pre-roll':'pill-jays','Gelt':'pill-gelt','Hamantaschen':'pill-hamantaschen','K4P Passover':'pill-k4p','Apparel':'pill-apparel','Paraphernalia':'pill-paraphernalia','Hanukkah':'pill-hanukkah','Honey':'pill-honey','Lead Gen':'pill-leadgen','4/20':'pill-420'})[c] || 'pill-other';
const flagCls = f => ({CLEAN:'flag-clean',Superlative:'flag-superlative','THC/CBD':'flag-thc',Health:'flag-health','FDA-claim':'flag-fda',Guarantee:'flag-guarantee'})[f]||'';
const fmtMoney = n => n>0?'$'+Math.round(n).toLocaleString():'—';
const fmtNum = n => n.toLocaleString();

const COHORT = JSON.parse(localStorage.getItem('reproduceCohort')||'[]');

function renderKpis() {
  const kpis = $('kpis');
  if (!COHORT.length) return;
  const spend = COHORT.reduce((a,r)=>a+(r.s||0),0);
  const rev = COHORT.reduce((a,r)=>a+(r.rev||0),0);
  const purch = COHORT.reduce((a,r)=>a+(r.p||0),0);
  const roas = spend > 0 ? (rev/spend) : 0;
  const adsTotal = COHORT.reduce((a,r)=>a+(r.ads||0),0);
  const cats = [...new Set(COHORT.map(r=>r.c))].sort();
  const doms = [...new Set(COHORT.filter(r=>r.dom).map(r=>r.dom))];
  kpis.innerHTML =
    '<div class="kpi"><div class="k">Selected creatives</div><div class="v">'+COHORT.length+'</div><div class="s">'+adsTotal+' underlying ads</div></div>' +
    '<div class="kpi"><div class="k">Total historical spend</div><div class="v">'+fmtMoney(spend)+'</div></div>' +
    '<div class="kpi"><div class="k">Cohort ROAS</div><div class="v">'+roas.toFixed(2)+'×</div><div class="s">'+fmtMoney(rev)+' revenue</div></div>' +
    '<div class="kpi"><div class="k">Purchases</div><div class="v">'+fmtNum(Math.round(purch))+'</div></div>' +
    '<div class="kpi"><div class="k">Categories</div><div class="v" style="font-size:13px">'+cats.join(' · ')+'</div></div>' +
    '<div class="kpi"><div class="k">LP Domains</div><div class="v" style="font-size:13px">'+(doms.join(' · ')||'—')+'</div></div>';
}

function card(r) {
  const flags = (r.flags||[]).map(f=>'<span class="'+flagCls(f)+'">'+esc(f)+'</span>').join(' ');
  const section = (label, val, plain) => val && String(val).trim() ? '<div class="section"><h3>'+esc(label)+'<button class="copy-btn" onclick="navigator.clipboard.writeText(this.nextElementSibling.textContent)">Copy</button></h3><div class="v'+(plain?' plain':'')+'">'+esc(val)+'</div></div>' : '';
  const chips = (label, arr) => arr && arr.length ? '<div class="section"><h3>'+esc(label)+'</h3><div>'+arr.map(x=>'<span class="chip">'+esc(x)+'</span>').join('')+'</div></div>' : '';
  const media = r.vid
    ? '<div class="media"><span class="vid-badge">▶ VIDEO</span><video src="'+esc(r.vid)+'" controls poster="'+esc(r.img)+'"></video></div>'
    : (r.img ? '<div class="media"><img src="'+esc(r.img)+'"></div>' : '<div class="media" style="color:#555">no media</div>');
  return '<article class="card">' +
    media +
    '<div class="body">' +
      '<h2>'+esc(r.n)+'</h2>' +
      '<div class="meta">' +
        '<span class="pill '+pillCls(r.c)+'">'+esc(r.c)+'</span>' +
        (r.dom?'<span class="dom-pill">'+esc(r.dom)+'</span>':'') +
        '<span>'+esc(r.f)+'</span>' +
        '<span>'+esc(r.acc)+'</span>' +
        '<span>Asset '+esc(r.uid)+' · Cluster '+esc(r.cl||'—')+'</span>' +
        (r.dt?'<span>'+esc(r.dt)+'</span>':'') +
      '</div>' +
      '<div class="metrics">' +
        '<div class="m"><div class="k">Spend</div><div class="v">'+fmtMoney(r.s)+'</div></div>' +
        '<div class="m"><div class="k">ROAS</div><div class="v">'+r.roas.toFixed(2)+'×</div></div>' +
        '<div class="m"><div class="k">Purchases</div><div class="v">'+fmtNum(r.p)+'</div></div>' +
        '<div class="m"><div class="k">CPP</div><div class="v">'+(r.cpp>0?'$'+r.cpp.toFixed(0):'—')+'</div></div>' +
        '<div class="m"><div class="k">CTR</div><div class="v">'+(r.ctr>0?r.ctr.toFixed(1)+'%':'—')+'</div></div>' +
        '<div class="m"><div class="k">Ads</div><div class="v">'+r.ads+'</div></div>' +
      '</div>' +
      '<div class="section"><h3>Compliance</h3><div class="v plain">'+(flags||'<span style="color:#8e8ea0">none</span>')+'</div></div>' +
      section('Headline', r.hd) +
      section('Hook', r.hook) +
      section('Primary Text / Body', r.body) +
      section('Description', r.desc) +
      section('Tone', r.tone, true) +
      chips('Offers', r.off) +
      (r.cta ? '<div class="section"><h3>CTA</h3><div class="v plain">'+esc(r.cta)+'</div></div>' : '') +
      (r.lp ? '<div class="section"><h3>Landing Page</h3><div class="v plain"><a href="'+esc(r.lp)+'" target="_blank">'+esc(r.lp)+'</a></div></div>' : '') +
      section('Objective · Optimization', [r.obj, r.og].filter(x=>x).join(' · '), true) +
      section('Targeting strategy', r.tgt, true) +
      chips('Audiences', r.aud) +
      chips('Adsets to clone', r.adset) +
      chips('Campaigns', r.camp) +
      '<div class="section"><h3>Ad IDs in asset group ('+r.aids.length+')</h3><div class="v" style="font-size:10.5px">'+r.aids.join(', ')+'</div></div>' +
      (r.vid?'<div class="section"><h3>Video MP4</h3><div class="v plain"><a href="'+esc(r.vid)+'" target="_blank">▶ Download / open</a></div></div>':'') +
      (r.img?'<div class="section"><h3>Hero image</h3><div class="v plain"><a href="'+esc(r.img)+'" target="_blank">Open fullres</a></div></div>':'') +
    '</div>' +
  '</article>';
}

function renderCards() {
  const c = $('cards');
  if (!COHORT.length) {
    c.innerHTML = '<div class="empty"><h2>No creatives selected</h2><p>Head back to the <a href="creative_index.html">Creative Index</a>, check the creatives you want to reproduce, then come back here for the full brief.</p></div>';
    return;
  }
  COHORT.sort((a,b)=>(b.s||0)-(a.s||0));
  c.innerHTML = COHORT.map(card).join('');
}

function clearCohort() {
  if (confirm('Clear all '+COHORT.length+' selected creatives?')) {
    localStorage.removeItem('reproduceCohort');
    localStorage.removeItem('selectedUids');
    location.reload();
  }
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(COHORT, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'reproduce-cohort-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function copyBrief() {
  const lines = [];
  lines.push('REPRODUCE COHORT · '+new Date().toISOString().slice(0,16)+'Z');
  lines.push('='.repeat(72));
  lines.push(COHORT.length+' creatives · $'+Math.round(COHORT.reduce((a,r)=>a+(r.s||0),0)).toLocaleString()+' historical spend');
  lines.push('');
  COHORT.forEach((r,i) => {
    lines.push('-'.repeat(72));
    lines.push('#'+(i+1)+' · '+r.n+' ['+r.c+' · '+r.f+']');
    lines.push('Metrics: '+r.roas.toFixed(2)+'× ROAS · $'+Math.round(r.s).toLocaleString()+' spend · '+r.p+' purchases · $'+(r.cpp>0?r.cpp.toFixed(0):'—')+' CPP · '+(r.ctr>0?r.ctr.toFixed(1)+'%':'—')+' CTR');
    lines.push('Account: '+r.acc+' · Asset UID: '+r.uid+' · Cluster: '+(r.cl||'—'));
    lines.push('Compliance: '+(r.flags||[]).join(', '));
    if (r.hd) lines.push('Headline: '+r.hd);
    if (r.hook) lines.push('Hook: '+r.hook);
    if (r.body) lines.push('Body:\n'+r.body);
    if (r.desc) lines.push('Description: '+r.desc);
    if (r.cta) lines.push('CTA: '+r.cta);
    if (r.lp) lines.push('LP: '+r.lp);
    if (r.off && r.off.length) lines.push('Offers: '+r.off.join(', '));
    if (r.tgt) lines.push('Targeting: '+r.tgt);
    if (r.aud && r.aud.length) lines.push('Audiences: '+r.aud.join(' | '));
    if (r.adset && r.adset.length) lines.push('Adsets: '+r.adset.join(' | '));
    if (r.img) lines.push('Image: '+r.img);
    if (r.vid) lines.push('Video: '+r.vid);
    lines.push('');
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    alert('Copied full brief ('+text.length+' chars) to clipboard');
  });
}

renderKpis();
renderCards();
</script>
</body>
</html>
